<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>atpstartups // Anantapur's Startup Future</title>
    <script>
      (function() {
        var errors = [];
        function showError(msg, loc, stack) {
          var div = document.getElementById('error-diagnostic-panel');
          if (!div) {
            div = document.createElement('div');
            div.id = 'error-diagnostic-panel';
            div.style.position = 'fixed';
            div.style.top = '0';
            div.style.left = '0';
            div.style.width = '100%';
            div.style.height = '100%';
            div.style.backgroundColor = '#120202';
            div.style.color = '#ff4d4d';
            div.style.padding = '2rem';
            div.style.fontFamily = 'monospace';
            div.style.zIndex = '9999999';
            div.style.overflowY = 'auto';
            div.style.boxSizing = 'border-box';
            div.style.display = 'block';
            div.innerHTML = '<h2 style="margin-top:0;color:#ff3333;border-bottom:1px solid #331111;padding-bottom:10px;">⚠️ RUNTIME EXCEPTION DETECTED</h2>' +
                           '<div id="errors-container"></div>' +
                           '<p style="color:#888;margin-top:2rem;font-size:11px;">This diagnostic panel assists in locating loading or execution faults.</p>';
            document.body.appendChild(div);
          }
          var container = document.getElementById('errors-container');
          if (container) {
            var item = document.createElement('div');
            item.style.marginBottom = '1.5rem';
            item.style.padding = '1rem';
            item.style.background = '#220606';
            item.style.borderLeft = '4px solid #ff3333';
            item.style.borderRadius = '4px';
            item.innerHTML = '<p style="margin:0 0 5px 0;font-weight:bold;font-size:14px;color:#ff9999;">Error: ' + msg + '</p>' +
                             '<p style="margin:0 0 10px 0;font-size:12px;color:#cc8888;">At: ' + loc + '</p>' +
                             '<pre style="margin:0;background:#0f0202;padding:10px;color:#ffa0a0;font-size:11px;overflow-x:auto;border-radius:3px;line-height:1.4;">' + (stack || 'No stack trace available') + '</pre>';
            container.appendChild(item);
          }
        }
        window.addEventListener('error', function(e) {
          showError(e.message, (e.filename || 'unknown') + ':' + (e.lineno || '0') + ':' + (e.colno || '0'), e.error ? e.error.stack : '');
        });
        window.addEventListener('unhandledrejection', function(e) {
          var reason = e.reason || {};
          showError(reason.message || String(reason), 'Promise Rejection', reason.stack || '');
        });
      })();
    </script>
    <script type="module" crossorigin src="/atpstartups/assets/index-BfhL8YeE.js"></script>
    <link rel="stylesheet" crossorigin href="/atpstartups/assets/index-BFaWCz_P.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
